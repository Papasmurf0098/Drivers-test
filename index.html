<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Reef Rider</title>
  <style>
    :root {
      --sky-top: #79d8cf;
      --sky-bottom: #2f7d71;
      --sand-a: #dbc88d;
      --sand-b: #cfb777;
      --road-a: #755f52;
      --road-b: #645146;
      --lane: #fff1b8;
      --panel: rgba(8, 16, 20, 0.32);
      --line: rgba(255,255,255,0.12);
      --shadow: rgba(0,0,0,0.25);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, var(--sky-top), var(--sky-bottom));
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: white;
      touch-action: none;
    }

    #game {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: max(8px, env(safe-area-inset-top)) 10px max(10px, env(safe-area-inset-bottom)) 10px;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 18px var(--shadow);
    }

    .mission {
      width: min(220px, 42vw);
      padding: 8px 10px;
    }

    .mission-label {
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }

    .meter {
      width: 100%;
      height: 7px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      overflow: hidden;
    }

    .meter > div {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #ffd86d, #ff8ec5);
      transition: width 120ms linear;
    }

    .stats {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
      max-width: 68vw;
    }

    .pill {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 999px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 18px var(--shadow);
      padding: 6px 9px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 10px;
      pointer-events: none;
    }

    .cluster {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .btn {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: rgba(8,16,20,0.26);
      color: white;
      font-size: 24px;
      font-weight: 900;
      display: grid;
      place-items: center;
      user-select: none;
      touch-action: none;
      box-shadow: 0 10px 20px var(--shadow);
      backdrop-filter: blur(8px);
      pointer-events: auto;
    }

    .btn.small {
      width: 52px;
      height: 52px;
      font-size: 18px;
    }

    .btn.active, .btn:active {
      transform: scale(0.98);
      background: rgba(255,255,255,0.2);
    }

    .menu {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 14px;
      background: rgba(6, 12, 14, 0.42);
      backdrop-filter: blur(8px);
    }

    .menu-card {
      width: min(420px, 100%);
      padding: 18px;
      border-radius: 22px;
      background: rgba(8, 20, 24, 0.9);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 18px 40px rgba(0,0,0,0.3);
    }

    .menu h1 {
      margin: 0 0 10px;
      font-size: 26px;
      line-height: 1.05;
    }

    .menu p {
      margin: 0 0 10px;
      line-height: 1.4;
      opacity: 0.92;
    }

    .small {
      font-size: 13px;
      opacity: 0.82;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .action {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font-weight: 900;
      background: linear-gradient(135deg, #ffd86d, #ff8ec5);
      color: #132126;
      box-shadow: 0 10px 24px rgba(0,0,0,0.24);
      cursor: pointer;
    }

    .action.secondary {
      background: rgba(255,255,255,0.12);
      color: white;
    }

    .hidden { display: none !important; }

    @media (max-width: 740px) {
      .btn { width: 58px; height: 58px; }
      .btn.small { width: 48px; height: 48px; }
      .stats { max-width: 58vw; }
      .pill { font-size: 11px; padding: 5px 8px; }
      .mission { width: min(170px, 38vw); }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div class="hud">
    <div class="top-row">
      <div class="panel mission">
        <div class="mission-label" id="missionLabel">Sector 1</div>
        <div class="meter"><div id="missionMeter"></div></div>
      </div>
      <div class="stats">
        <div class="pill">SPD <span id="speedLabel">0</span></div>
        <div class="pill">★ <span id="starsLabel">0</span></div>
        <div class="pill">◼ <span id="scrapLabel">0</span></div>
        <div class="pill">HP <span id="healthLabel">100</span></div>
      </div>
    </div>

    <div class="controls">
      <div class="cluster">
        <div class="btn" id="leftBtn">◀</div>
        <div class="btn" id="rightBtn">▶</div>
      </div>
      <div class="cluster">
        <div class="btn small" id="pauseBtn">Ⅱ</div>
        <div class="btn" id="brakeBtn">⏷</div>
        <div class="btn" id="gasBtn">▲</div>
      </div>
    </div>
  </div>

  <div class="menu" id="menu">
    <div class="menu-card">
      <h1 id="menuTitle">Reef Rider</h1>
      <p id="menuText">Drive, collect stars and scraps, dodge traffic, hit the gate, move to the next sector.</p>
      <p class="small">Single file. No extra assets. No giant overlay nonsense.</p>
      <div class="row">
        <button class="action" id="startBtn">Start</button>
        <button class="action secondary" id="continueBtn">Continue</button>
        <button class="action secondary" id="restartBtn">Reset</button>
        <button class="action secondary hidden" id="nextStageBtn">Next Sector</button>
      </div>
    </div>
  </div>

  <script>
    "use strict";

    const STORAGE_KEY = "reef-rider-clean-v1";

    const CONFIG = {
      maxVisibleDepth: 500,
      road: { width: 600, curveStrength: 0.92 },
      vehicle: { maxSpeed: 372, accel: 228, brake: 280, friction: 110, steer: 2.42, offroadDrag: 155 },
      themes: {
        lagoon: {
          label: "Shallow Bloom",
          skyTop: "#79d8cf", skyBottom: "#2f7d71", sandA: "#dbc88d", sandB: "#cfb777", roadA: "#755f52", roadB: "#645146", lane: "#fff1b8",
          haze: "rgba(255,245,188,0.55)", hillA: [26,96,88], hillB: [18,72,68], ambient: ["coralPink","bubbleTree","flower","rock"], density: 1.0
        },
        sunset: {
          label: "Amber Shelf",
          skyTop: "#ffb27d", skyBottom: "#a84f70", sandA: "#deb989", sandB: "#c78b78", roadA: "#6d5450", roadB: "#5a4541", lane: "#ffefb6",
          haze: "rgba(255,211,159,0.55)", hillA: [114,62,91], hillB: [82,48,72], ambient: ["coralBlue","flower","rock","bubbleTree"], density: 1.18
        },
        stormMint: {
          label: "Mint Squall",
          skyTop: "#a5eadb", skyBottom: "#397176", sandA: "#bfc8ac", sandB: "#92aa92", roadA: "#5b5954", roadB: "#474741", lane: "#f0ffd1",
          haze: "rgba(211,255,232,0.45)", hillA: [54,94,92], hillB: [38,74,74], ambient: ["bubbleTree","rock","coralBlue","flower"], density: 1.34
        },
        finale: {
          label: "Sapphire Crown",
          skyTop: "#91d4ff", skyBottom: "#4f72d0", sandA: "#d2cb9d", sandB: "#b6ad6a", roadA: "#6d645a", roadB: "#564e45", lane: "#fff7c4",
          haze: "rgba(232,236,255,0.5)", hillA: [62,88,164], hillB: [52,68,124], ambient: ["coralPink","coralBlue","bubbleTree","flower"], density: 1.52
        }
      },
      missions: [
        { title: "Welcome", gateDistance: 1100, needStars: 0, needScraps: 0, theme: "lagoon" },
        { title: "Supply Sweep", gateDistance: 2200, needStars: 6, needScraps: 2, theme: "sunset" },
        { title: "Traffic Trouble", gateDistance: 3380, needStars: 10, needScraps: 3, theme: "stormMint" },
        { title: "Final Sprint", gateDistance: 4580, needStars: 14, needScraps: 4, theme: "finale" }
      ]
    };

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const ui = {
      speed: document.getElementById("speedLabel"),
      stars: document.getElementById("starsLabel"),
      scraps: document.getElementById("scrapLabel"),
      health: document.getElementById("healthLabel"),
      missionLabel: document.getElementById("missionLabel"),
      missionMeter: document.getElementById("missionMeter"),
      menu: document.getElementById("menu"),
      menuTitle: document.getElementById("menuTitle"),
      menuText: document.getElementById("menuText"),
      start: document.getElementById("startBtn"),
      continue: document.getElementById("continueBtn"),
      restart: document.getElementById("restartBtn"),
      nextStage: document.getElementById("nextStageBtn"),
      pause: document.getElementById("pauseBtn")
    };

    const touchButtons = {
      left: document.getElementById("leftBtn"),
      right: document.getElementById("rightBtn"),
      gas: document.getElementById("gasBtn"),
      brake: document.getElementById("brakeBtn")
    };

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener("resize", resize);
    resize();

    const state = {
      running: false,
      paused: false,
      time: 0,
      speed: 0,
      worldDistance: 0,
      stageStartDistance: 0,
      playerX: 0,
      heading: 0,
      stars: 0,
      scraps: 0,
      health: 100,
      missionIndex: 0,
      gateFlash: 0,
      message: "",
      messageT: 0,
      collectibles: [],
      boosts: [],
      hazards: [],
      decorativeLayers: [],
      particles: [],
      screenShake: 0,
      stageCleared: false,
      finished: false,
      currentThemeKey: "lagoon",
      input: { left: false, right: false, gas: false, brake: false }
    };

    const assets = {};
    let audio = null;
    let musicState = { nextNoteAt: 0, step: 0 };

    function svgDataUrl(svg) { return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg); }
    function makeImage(svg) { const img = new Image(); img.src = svgDataUrl(svg); return img; }

    function buildAssets() {
      assets.player = makeImage(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 160 120'><ellipse cx='80' cy='104' rx='44' ry='10' fill='rgba(0,0,0,.18)'/><circle cx='54' cy='24' r='16' fill='#dff8bb'/><circle cx='106' cy='24' r='16' fill='#dff8bb'/><circle cx='54' cy='24' r='6' fill='#1e2b2f'/><circle cx='106' cy='24' r='6' fill='#1e2b2f'/><rect x='18' y='42' width='20' height='28' rx='5' fill='#243036'/><rect x='122' y='42' width='20' height='28' rx='5' fill='#243036'/><rect x='18' y='76' width='20' height='28' rx='5' fill='#243036'/><rect x='122' y='76' width='20' height='28' rx='5' fill='#243036'/><rect x='22' y='28' width='116' height='70' rx='24' fill='#6ecb51'/><rect x='40' y='44' width='80' height='26' rx='10' fill='#e8f5bf'/><rect x='44' y='32' width='18' height='8' rx='2' fill='#fff1b0'/><rect x='98' y='32' width='18' height='8' rx='2' fill='#fff1b0'/><rect x='44' y='82' width='18' height='7' rx='2' fill='#ff9ac6'/><rect x='98' y='82' width='18' height='7' rx='2' fill='#ff9ac6'/><circle cx='60' cy='56' r='5' fill='#1e2b2f'/><circle cx='100' cy='56' r='5' fill='#1e2b2f'/><path d='M64 72 Q80 86 96 72' fill='none' stroke='#1e2b2f' stroke-width='4' stroke-linecap='round'/></svg>`);
      assets.enemyPink = makeImage(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 80'><rect x='6' y='16' width='108' height='48' rx='16' fill='#ff7fa2'/><rect x='22' y='28' width='76' height='20' rx='8' fill='#ffe8f1'/><rect x='10' y='10' width='18' height='18' rx='4' fill='#25323a'/><rect x='92' y='10' width='18' height='18' rx='4' fill='#25323a'/><rect x='10' y='52' width='18' height='18' rx='4' fill='#25323a'/><rect x='92' y='52' width='18' height='18' rx='4' fill='#25323a'/></svg>`);
      assets.enemyBlue = makeImage(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 80'><rect x='6' y='16' width='108' height='48' rx='16' fill='#73b7ff'/><rect x='22' y='28' width='76' height='20' rx='8' fill='#eff7ff'/><rect x='10' y='10' width='18' height='18' rx='4' fill='#25323a'/><rect x='92' y='10' width='18' height='18' rx='4' fill='#25323a'/><rect x='10' y='52' width='18' height='18' rx='4' fill='#25323a'/><rect x='92' y='52' width='18' height='18' rx='4' fill='#25323a'/></svg>`);
      assets.enemyYellow = makeImage(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 80'><rect x='6' y='16' width='108' height='48' rx='16' fill='#ffd86d'/><rect x='22' y='28' width='76' height='20' rx='8' fill='#fff8d8'/><rect x='10' y='10' width='18' height='18' rx='4' fill='#25323a'/><rect x='92' y='10' width='18' height='18' rx='4' fill='#25323a'/><rect x='10' y='52' width='18' height='18' rx='4' fill='#25323a'/><rect x='92' y='52' width='18' height='18' rx='4' fill='#25323a'/></svg>`);
      assets.coralPink = makeImage(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 70 90'><path d='M32 88 L32 50 C32 34 22 22 18 8 C10 20 16 30 20 42 C4 28 0 48 10 60 C20 52 26 56 28 70 L28 88 Z' fill='#ef82ab'/><path d='M38 88 L38 54 C38 38 46 26 50 12 C58 24 54 34 48 44 C64 34 70 54 60 66 C50 58 44 62 42 74 L42 88 Z' fill='#ffb069'/></svg>`);
      assets.coralBlue = makeImage(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 70 90'><path d='M32 88 L32 50 C32 34 22 22 18 8 C10 20 16 30 20 42 C4 28 0 48 10 60 C20 52 26 56 28 70 L28 88 Z' fill='#77d9ff'/><path d='M38 88 L38 54 C38 38 46 26 50 12 C58 24 54 34 48 44 C64 34 70 54 60 66 C50 58 44 62 42 74 L42 88 Z' fill='#8cf0d0'/></svg>`);
      assets.rock = makeImage(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 90 60'><path d='M8 52 L18 22 L42 8 L72 16 L82 40 L68 54 Z' fill='#6b7073'/><path d='M18 22 L42 8 L54 22 L30 32 Z' fill='rgba(255,255,255,.12)'/></svg>`);
      assets.bubbleTree = makeImage(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 120'><rect x='36' y='56' width='8' height='58' rx='4' fill='#69906f'/><circle cx='28' cy='44' r='16' fill='rgba(180,255,255,.72)'/><circle cx='48' cy='34' r='20' fill='rgba(180,255,255,.72)'/><circle cx='58' cy='52' r='14' fill='rgba(180,255,255,.72)'/><circle cx='40' cy='58' r='12' fill='rgba(180,255,255,.72)'/></svg>`);
      assets.flower = makeImage(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 90 90'><circle cx='45' cy='45' r='10' fill='#ffd86d'/><ellipse cx='45' cy='15' rx='12' ry='20' fill='#f0bce0'/><ellipse cx='45' cy='75' rx='12' ry='20' fill='#f0bce0'/><ellipse cx='15' cy='45' rx='20' ry='12' fill='#f0bce0'/><ellipse cx='75' cy='45' rx='20' ry='12' fill='#f0bce0'/><ellipse cx='23' cy='23' rx='16' ry='10' transform='rotate(-45 23 23)' fill='#f0bce0'/><ellipse cx='67' cy='23' rx='16' ry='10' transform='rotate(45 67 23)' fill='#f0bce0'/></svg>`);
      assets.star = makeImage(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><path d='M32 4 L38 22 L58 22 L42 34 L48 56 L32 42 L16 56 L22 34 L6 22 L26 22 Z' fill='#ffe07a'/></svg>`);
      assets.scrap = makeImage(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 56 56'><rect x='10' y='10' width='36' height='36' rx='8' fill='#9af7d8'/><rect x='22' y='22' width='12' height='12' rx='2' fill='rgba(255,255,255,.45)'/></svg>`);
      assets.boost = makeImage(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 50'><rect x='4' y='8' width='112' height='34' rx='14' fill='#74dfff'/><path d='M18 25 H102' stroke='#effcff' stroke-width='6' stroke-linecap='round'/><path d='M76 15 L96 25 L76 35' stroke='#effcff' stroke-width='6' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>`);
      assets.gate = makeImage(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 140'><path d='M20 120 L20 20 L180 20 L180 120' fill='rgba(255,240,170,.14)' stroke='rgba(255,236,144,.85)' stroke-width='12' stroke-linecap='round' stroke-linejoin='round'/></svg>`);
      assets.glowOrb = makeImage(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 80'><circle cx='40' cy='40' r='28' fill='rgba(255,255,255,.18)'/><circle cx='40' cy='40' r='16' fill='rgba(255,255,255,.34)'/></svg>`);
    }
    buildAssets();

    function ensureAudio() {
      if (audio) return audio;
      try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return null;
        const context = new AudioCtx();
        const master = context.createGain();
        const musicBus = context.createGain();
        const sfxBus = context.createGain();
        master.gain.value = 0.18;
        musicBus.gain.value = 0.16;
        sfxBus.gain.value = 0.42;
        musicBus.connect(master);
        sfxBus.connect(master);
        master.connect(context.destination);
        audio = { context, musicBus, sfxBus };
        return audio;
      } catch {
        return null;
      }
    }

    function beep(type = "sine", frequency = 440, duration = 0.08, volume = 0.6, slide = 0, busName = "sfxBus") {
      const engine = ensureAudio();
      if (!engine) return;
      if (engine.context.state === "suspended") engine.context.resume().catch(() => {});
      const now = engine.context.currentTime;
      const osc = engine.context.createOscillator();
      const gain = engine.context.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(frequency, now);
      if (slide !== 0) osc.frequency.linearRampToValueAtTime(Math.max(40, frequency + slide), now + duration);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, volume * 0.12), now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      osc.connect(gain);
      gain.connect(engine[busName]);
      osc.start(now);
      osc.stop(now + duration + 0.02);
    }

    function currentScaleNotes() {
      const theme = currentMission()?.theme || "lagoon";
      if (theme === "sunset") return [220, 261.63, 329.63, 392, 440, 523.25];
      if (theme === "stormMint") return [196, 246.94, 293.66, 349.23, 392, 493.88];
      if (theme === "finale") return [261.63, 329.63, 392, 523.25, 587.33, 659.25];
      return [220, 277.18, 329.63, 392, 440, 554.37];
    }

    function musicTick() {
      const engine = ensureAudio();
      if (!engine || !state.running || state.paused) return;
      const now = engine.context.currentTime;
      if (musicState.nextNoteAt === 0) musicState.nextNoteAt = now;
      while (musicState.nextNoteAt < now + 0.15) {
        const notes = currentScaleNotes();
        const idx = musicState.step % notes.length;
        const note = notes[idx];
        beep(idx % 3 === 0 ? "triangle" : "sine", note, 0.12, 0.22 + (state.speed / CONFIG.vehicle.maxSpeed) * 0.1, 0, "musicBus");
        if (musicState.step % 4 === 0) beep("sine", note / 2, 0.18, 0.12, 0, "musicBus");
        musicState.nextNoteAt += 0.22;
        musicState.step += 1;
      }
    }

    function playCollectSound(type) { beep(type === "star" ? "triangle" : "square", type === "star" ? 660 : 320, 0.08, 0.65, type === "star" ? 120 : 60); }
    function playBoostSound() { beep("sawtooth", 260, 0.12, 0.68, 260); }
    function playCrashSound() { beep("square", 140, 0.16, 0.8, -60); }
    function playGateSound() { beep("triangle", 520, 0.12, 0.8, 180); setTimeout(() => beep("triangle", 700, 0.1, 0.65, 80), 60); }
    function playFailSound() { beep("square", 200, 0.18, 0.8, -80); }

    function saveGame() {
      const payload = {
        stars: state.stars,
        scraps: state.scraps,
        missionIndex: state.missionIndex,
        worldDistance: state.worldDistance,
        health: state.health,
        finished: state.finished
      };
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(payload)); } catch {}
    }

    function loadGame() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        const data = JSON.parse(raw);
        if (!data || typeof data !== "object") return false;
        state.stars = Number(data.stars) || 0;
        state.scraps = Number(data.scraps) || 0;
        state.missionIndex = Math.max(0, Math.min(CONFIG.missions.length - 1, Number(data.missionIndex) || 0));
        state.worldDistance = Math.max(0, Number(data.worldDistance) || 0);
        state.health = Math.max(20, Math.min(100, Number(data.health) || 100));
        state.finished = !!data.finished;
        return true;
      } catch {
        return false;
      }
    }

    function clearSave() { try { localStorage.removeItem(STORAGE_KEY); } catch {} }
    function currentMission() { return CONFIG.missions[state.missionIndex] || null; }
    function currentTheme() { return CONFIG.themes[state.currentThemeKey] || CONFIG.themes.lagoon; }

    function applyTheme(themeKey) {
      state.currentThemeKey = themeKey;
      const t = currentTheme();
      const root = document.documentElement.style;
      root.setProperty("--sky-top", t.skyTop);
      root.setProperty("--sky-bottom", t.skyBottom);
      root.setProperty("--sand-a", t.sandA);
      root.setProperty("--sand-b", t.sandB);
      root.setProperty("--road-a", t.roadA);
      root.setProperty("--road-b", t.roadB);
      root.setProperty("--lane", t.lane);
    }

    function buildWorld() {
      state.collectibles = [];
      state.boosts = [];
      state.hazards = [];
      state.decorativeLayers = [];

      for (let z = 160; z <= 5800; z += 118) {
        state.collectibles.push({ z: z + Math.random() * 36, x: (Math.random() * 2 - 1) * 185, taken: false, type: Math.random() < 0.76 ? "star" : "scrap" });
      }
      for (let z = 520; z <= 5600; z += 470) {
        state.boosts.push({ z: z + Math.random() * 40, x: (Math.random() * 2 - 1) * 120, used: false });
      }
      const hazardTypes = ["drifter", "sweeper", "sprinter"];
      for (let z = 740; z <= 5600; z += 240) {
        state.hazards.push({
          z,
          x: (Math.random() * 2 - 1) * 136,
          laneDrift: Math.random() * 0.8 + 0.35,
          phase: Math.random() * Math.PI * 2,
          hitTimer: 0,
          type: hazardTypes[Math.floor(Math.random() * hazardTypes.length)],
          speedBias: 0.6 + Math.random() * 0.75,
          sprite: [assets.enemyPink, assets.enemyBlue, assets.enemyYellow][Math.floor(Math.random() * 3)]
        });
      }

      const theme = currentTheme();
      const ambientSprites = theme.ambient.map(name => assets[name]);
      for (let z = 8; z <= CONFIG.maxVisibleDepth; z += 4) {
        const densityBase = z > 280 ? 6 : z > 170 ? 4 : 3;
        const density = Math.max(2, Math.round(densityBase * theme.density));
        for (let i = 0; i < density; i++) {
          const side = Math.random() < 0.5 ? -1 : 1;
          const laneOffset = 54 + Math.random() * 145;
          const sprite = ambientSprites[Math.floor(Math.random() * ambientSprites.length)];
          state.decorativeLayers.push({
            z: z + Math.random() * 3,
            x: side * laneOffset + Math.random() * 24 * side,
            sprite,
            parallax: 0.88 + Math.random() * 0.28,
            bob: Math.random() * Math.PI * 2,
            scaleMul: 0.82 + Math.random() * 1.05,
            alpha: 0.72 + Math.random() * 0.28
          });
        }
      }
    }

    function resetState() {
      state.running = false;
      state.paused = false;
      state.time = 0;
      state.speed = 0;
      state.worldDistance = 0;
      state.stageStartDistance = 0;
      state.playerX = 0;
      state.heading = 0;
      state.stars = 0;
      state.scraps = 0;
      state.health = 100;
      state.missionIndex = 0;
      state.gateFlash = 0;
      state.message = "";
      state.messageT = 0;
      state.collectibles = [];
      state.boosts = [];
      state.hazards = [];
      state.decorativeLayers = [];
      state.particles = [];
      state.screenShake = 0;
      state.stageCleared = false;
      state.finished = false;
      state.input.left = false;
      state.input.right = false;
      state.input.gas = false;
      state.input.brake = false;
      startStage(false);
      syncUI();
    }

    function startStage(fromHub = true) {
      const mission = currentMission();
      if (!mission) return;
      applyTheme(mission.theme);
      state.running = false;
      state.paused = false;
      state.speed = 0;
      state.playerX = 0;
      state.heading = 0;
      state.stageCleared = false;
      state.screenShake = 0;
      state.stageStartDistance = Math.max(0, mission.gateDistance - 900);
      state.worldDistance = Math.max(0, state.stageStartDistance);
      buildWorld();
      updateMenu(fromHub ? "drive" : "start");
      syncUI();
    }

    function resumeFromSave() {
      resetState();
      if (loadGame()) {
        applyTheme(currentMission()?.theme || "lagoon");
        buildWorld();
        for (const item of state.collectibles) if (item.z < state.worldDistance - 80) item.taken = true;
        for (const boost of state.boosts) if (boost.z < state.worldDistance - 80) boost.used = true;
        state.stageStartDistance = Math.max(0, state.worldDistance - 320);
      }
      updateMenu("resume");
      syncUI();
    }

    const keyMap = { ArrowLeft: "left", ArrowRight: "right", ArrowUp: "gas", ArrowDown: "brake", a: "left", d: "right", w: "gas", s: "brake" };
    window.addEventListener("keydown", (event) => {
      const mapped = keyMap[event.key];
      if (mapped) { state.input[mapped] = true; event.preventDefault(); }
      if (event.key === "p" || event.key === "P") { togglePause(); event.preventDefault(); }
    }, { passive: false });
    window.addEventListener("keyup", (event) => {
      const mapped = keyMap[event.key];
      if (mapped) { state.input[mapped] = false; event.preventDefault(); }
    }, { passive: false });

    function bindHold(node, key) {
      if (!node) return;
      const press = (event) => { ensureAudio(); state.input[key] = true; node.classList.add("active"); event.preventDefault(); };
      const release = (event) => { state.input[key] = false; node.classList.remove("active"); event.preventDefault(); };
      ["pointerdown", "touchstart"].forEach(type => node.addEventListener(type, press, { passive: false }));
      ["pointerup", "pointerleave", "pointercancel", "touchend", "touchcancel"].forEach(type => node.addEventListener(type, release, { passive: false }));
    }
    bindHold(touchButtons.left, "left");
    bindHold(touchButtons.right, "right");
    bindHold(touchButtons.gas, "gas");
    bindHold(touchButtons.brake, "brake");

    function togglePause() {
      if (!state.running || state.stageCleared || state.finished) return;
      state.paused = !state.paused;
      beep("triangle", state.paused ? 340 : 420, 0.05, 0.4, state.paused ? -20 : 30);
    }
    ui.pause.addEventListener("click", () => { ensureAudio(); togglePause(); });

    function clamp(value, min, max) { return Math.max(min, Math.min(max, value)); }
    function projectZ(z) {
      const h = window.innerHeight;
      const depth = Math.max(z, 1);
      const perspective = 1 / depth;
      return { y: h * 0.42 + (1 - perspective * 182) * h * 0.58, scale: perspective * 950 };
    }
    function roadCurveAt(z) { return Math.sin((state.worldDistance + z) * 0.00152) * 186 * CONFIG.road.curveStrength; }

    function emitParticle(x, y, vx, vy, size, life, color) {
      state.particles.push({ x, y, vx, vy, size, life, maxLife: life, color });
    }
    function emitDust(x, y, count = 2) {
      for (let i = 0; i < count; i++) emitParticle(x + (Math.random() * 20 - 10), y + (Math.random() * 8 - 4), Math.random() * 14 - 7, -10 - Math.random() * 8, 4 + Math.random() * 6, 0.45 + Math.random() * 0.35, "rgba(226,212,168,0.68)");
    }
    function emitSpark(x, y, color = "rgba(255,232,130,0.9)") {
      for (let i = 0; i < 7; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 20 + Math.random() * 34;
        emitParticle(x, y, Math.cos(angle) * speed, Math.sin(angle) * speed, 3 + Math.random() * 3, 0.35 + Math.random() * 0.2, color);
      }
    }
    function shake(amount = 0.25) { state.screenShake = Math.max(state.screenShake, amount); }

    function updateParticles(dt) {
      for (let i = state.particles.length - 1; i >= 0; i--) {
        const p = state.particles[i];
        p.life -= dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 22 * dt;
        if (p.life <= 0) state.particles.splice(i, 1);
      }
    }

    function triggerFailure(reason = "You got wrecked") {
      state.running = false;
      state.paused = false;
      state.stageCleared = false;
      playFailSound();
      updateMenu("fail", reason);
    }

    function updateCollectibles() {
      for (const item of state.collectibles) {
        if (item.taken) continue;
        const dz = item.z - state.worldDistance;
        if (dz < -30 || dz > 180) continue;
        const dx = Math.abs(item.x - state.playerX);
        if (dz < 48 && dx < 40) {
          item.taken = true;
          if (item.type === "star") state.stars += 1; else state.scraps += 1;
          emitSpark(window.innerWidth / 2, window.innerHeight - 120, item.type === "star" ? "rgba(255,232,130,0.9)" : "rgba(145,255,220,0.88)");
          playCollectSound(item.type);
          saveGame();
        }
      }
    }

    function updateBoosts() {
      for (const boost of state.boosts) {
        if (boost.used) continue;
        const dz = boost.z - state.worldDistance;
        if (dz < -20 || dz > 150) continue;
        const dx = Math.abs(boost.x - state.playerX);
        if (dz < 36 && dx < 48) {
          boost.used = true;
          state.speed = Math.min(CONFIG.vehicle.maxSpeed, state.speed + 105);
          emitSpark(window.innerWidth / 2, window.innerHeight - 118, "rgba(154,247,255,0.9)");
          playBoostSound();
        }
      }
    }

    function updateHazards(dt) {
      for (const car of state.hazards) {
        car.hitTimer = Math.max(0, car.hitTimer - dt);
        const dz = car.z - state.worldDistance;
        if (car.type === "drifter") car.x += Math.sin(state.time * car.laneDrift + car.phase) * 0.8;
        if (car.type === "sweeper") car.x += Math.sin(state.time * (car.laneDrift * 0.7) + car.phase) * 1.45;
        if (car.type === "sprinter") car.z -= (state.speed * 0.28 + 28 * car.speedBias) * dt;
        car.x = clamp(car.x, -190, 190);
        if (dz < -170) {
          car.z += 1850 + Math.random() * 260;
          car.x = (Math.random() * 2 - 1) * 140;
          car.phase = Math.random() * Math.PI * 2;
          car.hitTimer = 0;
          continue;
        }
        if (dz > 90 || dz < -40) continue;
        const dx = Math.abs(car.x - state.playerX);
        if (dx < 48 && dz < 26 && car.hitTimer <= 0) {
          car.hitTimer = 1.2;
          state.speed = Math.max(0, state.speed - 118);
          state.health = clamp(state.health - 18, 0, 100);
          emitSpark(window.innerWidth / 2 + state.playerX * 0.9, window.innerHeight - 110, "rgba(255,170,120,0.9)");
          playCrashSound();
          shake(0.35);
          if (state.health <= 0) {
            triggerFailure();
            return;
          }
        }
      }
    }

    function updateMissionState() {
      const mission = currentMission();
      if (!mission) return;
      const gateDistance = mission.gateDistance;
      if (Math.abs(gateDistance - state.worldDistance) < 88) state.gateFlash = 0.18;
      const ready = state.stars >= mission.needStars && state.scraps >= mission.needScraps && state.worldDistance >= gateDistance;
      if (ready) {
        playGateSound();
        state.running = false;
        state.stageCleared = true;
        if (state.missionIndex >= CONFIG.missions.length - 1) {
          state.finished = true;
          updateMenu("finish");
        } else {
          updateMenu("clear");
        }
        saveGame();
      }
    }

    function update(dt) {
      state.time += dt;
      state.screenShake = Math.max(0, state.screenShake - dt * 1.5);
      musicTick();
      if (!state.running || state.paused) {
        updateParticles(dt);
        syncUI();
        return;
      }

      const vehicle = CONFIG.vehicle;
      if (state.input.gas) state.speed += vehicle.accel * dt;
      else state.speed -= vehicle.friction * dt;
      if (state.input.brake) state.speed -= vehicle.brake * dt;
      state.speed = clamp(state.speed, 0, vehicle.maxSpeed);

      const steerFactor = 1 - Math.min(state.speed / vehicle.maxSpeed, 0.8) * 0.43;
      if (state.input.left) state.playerX -= vehicle.steer * steerFactor * state.speed * 0.0115 * dt * 60;
      if (state.input.right) state.playerX += vehicle.steer * steerFactor * state.speed * 0.0115 * dt * 60;
      if (!state.input.left && !state.input.right) state.playerX *= (1 - Math.min(0.06, dt * 4.5));
      state.playerX = clamp(state.playerX, -CONFIG.road.width * 0.8, CONFIG.road.width * 0.8);

      const roadHalf = CONFIG.road.width * 0.45;
      if (Math.abs(state.playerX) > roadHalf) {
        state.speed = Math.max(0, state.speed - vehicle.offroadDrag * dt);
        emitDust(window.innerWidth / 2 + state.playerX * 0.9, window.innerHeight - 100, 1);
      }

      state.worldDistance += state.speed * dt;
      state.heading = Math.sin(state.worldDistance * 0.00155) * CONFIG.road.curveStrength;
      state.gateFlash = Math.max(0, state.gateFlash - dt);

      updateCollectibles();
      updateBoosts();
      updateHazards(dt);
      updateMissionState();
      updateParticles(dt);
      syncUI();
    }

    function syncUI() {
      const mission = currentMission();
      ui.speed.textContent = Math.round(state.speed);
      ui.stars.textContent = state.stars;
      ui.scraps.textContent = state.scraps;
      ui.health.textContent = Math.round(state.health);
      if (mission) {
        ui.missionLabel.textContent = `${currentTheme().label} ${state.missionIndex + 1}/${CONFIG.missions.length}`;
        const starProgress = mission.needStars > 0 ? Math.min(state.stars / mission.needStars, 1) : 1;
        const scrapProgress = mission.needScraps > 0 ? Math.min(state.scraps / mission.needScraps, 1) : 1;
        const denom = Math.max(1, mission.gateDistance - state.stageStartDistance);
        const gateProgress = Math.min((state.worldDistance - state.stageStartDistance) / denom, 1);
        ui.missionMeter.style.width = `${((starProgress + scrapProgress + gateProgress) / 3) * 100}%`;
      } else {
        ui.missionLabel.textContent = "Complete";
        ui.missionMeter.style.width = "100%";
      }
      ui.pause.textContent = state.paused ? "▶" : "Ⅱ";
    }

    function drawBackground() {
      const w = window.innerWidth, h = window.innerHeight, t = currentTheme();
      const sky = ctx.createLinearGradient(0, 0, 0, h * 0.64);
      sky.addColorStop(0, t.skyTop); sky.addColorStop(1, t.skyBottom);
      ctx.fillStyle = sky; ctx.fillRect(0, 0, w, h);
      drawSprite(assets.glowOrb, w * 0.5, h * 0.2, h * 0.18, h * 0.18, 0, 0.7);
      for (let i = 0; i < 6; i++) {
        ctx.beginPath(); const baseY = h * (0.32 + i * 0.024); ctx.moveTo(0, h);
        for (let x = 0; x <= w; x += 16) { const y = baseY + Math.sin(x * 0.007 + i * 1.25 + state.time * 0.08) * (12 + i * 4); ctx.lineTo(x, y); }
        ctx.lineTo(w, h); ctx.closePath();
        const rgb = i % 2 === 0 ? t.hillA : t.hillB; ctx.fillStyle = `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, ${0.46 - i * 0.05})`; ctx.fill();
      }
      const ground = ctx.createLinearGradient(0, h * 0.42, 0, h); ground.addColorStop(0, t.sandA); ground.addColorStop(1, t.sandB);
      ctx.fillStyle = ground; ctx.fillRect(0, h * 0.42, w, h * 0.58);
    }

    function drawRoad() {
      const w = window.innerWidth, t = currentTheme();
      for (let z = CONFIG.maxVisibleDepth; z >= 1; z -= 4) {
        const near = projectZ(z), far = projectZ(z + 4), curveNear = roadCurveAt(z), curveFar = roadCurveAt(z + 4), roadWNear = CONFIG.road.width * near.scale, roadWFar = CONFIG.road.width * far.scale, centerNear = w / 2 + curveNear, centerFar = w / 2 + curveFar;
        ctx.fillStyle = (Math.floor((state.worldDistance + z) / 60) % 2 === 0) ? "rgba(255,255,255,0.03)" : "rgba(0,0,0,0.03)"; ctx.fillRect(0, far.y, w, near.y - far.y + 1);
        const roadFill = ctx.createLinearGradient(0, far.y, 0, near.y); roadFill.addColorStop(0, t.roadB); roadFill.addColorStop(1, t.roadA); ctx.fillStyle = roadFill;
        ctx.beginPath(); ctx.moveTo(centerFar - roadWFar / 2, far.y); ctx.lineTo(centerFar + roadWFar / 2, far.y); ctx.lineTo(centerNear + roadWNear / 2, near.y); ctx.lineTo(centerNear - roadWNear / 2, near.y); ctx.closePath(); ctx.fill();
        ctx.strokeStyle = "rgba(255,232,172,0.24)"; ctx.lineWidth = Math.max(1, near.scale * 8); ctx.beginPath(); ctx.moveTo(centerFar - roadWFar / 2, far.y); ctx.lineTo(centerNear - roadWNear / 2, near.y); ctx.moveTo(centerFar + roadWFar / 2, far.y); ctx.lineTo(centerNear + roadWNear / 2, near.y); ctx.stroke();
        if (Math.floor((state.worldDistance + z) / 88) % 2 === 0) { ctx.strokeStyle = t.lane; ctx.lineWidth = Math.max(1, near.scale * 12); ctx.beginPath(); ctx.moveTo(centerFar, far.y); ctx.lineTo(centerNear, near.y); ctx.stroke(); }
      }
    }

    function drawSprite(img, x, y, w, h, rotation = 0, alpha = 1) {
      ctx.save(); ctx.globalAlpha = alpha; ctx.translate(x, y); ctx.rotate(rotation); ctx.drawImage(img, -w / 2, -h / 2, w, h); ctx.restore();
    }

    function drawDenseScenery() {
      const w = window.innerWidth;
      const sorted = state.decorativeLayers.slice().sort((a, b) => b.z - a.z);
      for (const item of sorted) {
        const p = projectZ(item.z), curve = roadCurveAt(item.z), x = w / 2 + curve + item.x * p.scale * item.parallax, y = p.y - 6 * p.scale + Math.sin(state.time * 2 + item.bob) * 2.5 * p.scale;
        const size = 36 * p.scale * item.scaleMul;
        drawSprite(item.sprite, x, y, size * 1.36, size * 1.7, 0, item.alpha);
      }
    }

    function drawCollectibles() {
      const w = window.innerWidth;
      for (const item of state.collectibles) {
        if (item.taken) continue;
        const dz = item.z - state.worldDistance; if (dz < 0 || dz > CONFIG.maxVisibleDepth) continue;
        const p = projectZ(dz), curve = roadCurveAt(dz), x = w / 2 + curve + item.x * p.scale * 1.15, y = p.y - 28 * p.scale + Math.sin(state.time * 6 + item.z * 0.02) * 8 * p.scale;
        const img = item.type === "star" ? assets.star : assets.scrap; const size = (item.type === "star" ? 30 : 24) * Math.max(0.42, p.scale * 0.97);
        drawSprite(img, x, y, size, size, Math.sin(state.time * 4 + item.z * 0.02) * 0.12, 1);
      }
    }

    function drawBoostPads() {
      const w = window.innerWidth;
      for (const boost of state.boosts) {
        if (boost.used) continue;
        const dz = boost.z - state.worldDistance; if (dz < 0 || dz > CONFIG.maxVisibleDepth) continue;
        const near = projectZ(dz), curve = roadCurveAt(dz), x = w / 2 + curve + boost.x * near.scale * 1.14;
        drawSprite(assets.boost, x, near.y - 8 * near.scale, 84 * near.scale, 36 * near.scale, 0.04 * Math.sin(state.time * 8 + boost.z), 1);
      }
    }

    function drawHazards() {
      const w = window.innerWidth;
      for (const car of state.hazards) {
        const dz = car.z - state.worldDistance; if (dz < 0 || dz > CONFIG.maxVisibleDepth) continue;
        const p = projectZ(dz), curve = roadCurveAt(dz), x = w / 2 + curve + car.x * p.scale * 1.12;
        drawSprite(car.sprite, x, p.y - 4 * p.scale, 58 * Math.max(0.45, p.scale * 1.36), 38 * Math.max(0.45, p.scale * 1.36), car.hitTimer > 0 ? 0.05 : 0, 1);
      }
    }

    function drawGate() {
      const mission = currentMission(); if (!mission) return;
      const dz = mission.gateDistance - state.worldDistance; if (dz < 0 || dz > CONFIG.maxVisibleDepth) return;
      const p = projectZ(dz), curve = roadCurveAt(dz), x = window.innerWidth / 2 + curve;
      drawSprite(assets.gate, x, p.y - 26 * p.scale, 196 * p.scale, 136 * p.scale, 0, state.gateFlash > 0 ? 1 : 0.88);
    }

    function drawPlayer() {
      const x = window.innerWidth / 2 + state.playerX * 0.9, y = window.innerHeight - 110;
      if (Math.abs(state.playerX) > CONFIG.road.width * 0.45) emitDust(x, y + 12, 1);
      drawSprite(assets.player, x, y, 114, 90, (-state.heading * 0.05) + (state.input.left ? -0.045 : 0) + (state.input.right ? 0.045 : 0), 1);
    }

    function drawParticles() {
      for (const p of state.particles) {
        const alpha = Math.max(0, p.life / p.maxLife);
        ctx.save(); ctx.globalAlpha = alpha; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size * Math.max(0.2, alpha), 0, Math.PI * 2); ctx.fill(); ctx.restore();
      }
    }

    function updateMenu(mode, reason = "") {
      ui.menu.classList.remove("hidden");
      ui.start.classList.toggle("hidden", mode !== "start" && mode !== "resume");
      ui.continue.classList.toggle("hidden", mode !== "start" && mode !== "resume");
      ui.restart.classList.remove("hidden");
      ui.nextStage.classList.toggle("hidden", !(mode === "clear" || mode === "drive"));
      if (mode === "start") {
        ui.menuTitle.textContent = "Reef Rider";
        ui.menuText.textContent = "Drive, collect, dodge, hit the gate.";
      } else if (mode === "resume") {
        ui.menuTitle.textContent = "Continue";
        ui.menuText.textContent = "Jump back in or reset.";
      } else if (mode === "clear") {
        ui.menuTitle.textContent = "Sector Clear";
        ui.menuText.textContent = "Hit the next sector when ready.";
      } else if (mode === "drive") {
        ui.menuTitle.textContent = currentTheme().label;
        ui.menuText.textContent = "Ready for the next run.";
      } else if (mode === "fail") {
        ui.menuTitle.textContent = "Wrecked";
        ui.menuText.textContent = reason || "Try again.";
        ui.nextStage.classList.add("hidden");
      } else if (mode === "finish") {
        ui.menuTitle.textContent = "Complete";
        ui.menuText.textContent = "You cleared the whole route.";
        ui.nextStage.classList.add("hidden");
      }
    }

    function startRun() {
      ensureAudio();
      state.running = true;
      state.paused = false;
      state.stageCleared = false;
      state.finished = false;
      ui.menu.classList.add("hidden");
      beep("triangle", 480, 0.08, 0.5, 120);
      saveGame();
    }
    function startFresh() { clearSave(); resetState(); startRun(); }
    function startFromSave() { ensureAudio(); resumeFromSave(); startRun(); }
    function enterNextStage() {
      ensureAudio();
      if (state.finished) { updateMenu("finish"); return; }
      if (state.stageCleared) state.missionIndex += 1;
      if (state.missionIndex >= CONFIG.missions.length) { state.finished = true; state.running = false; updateMenu("finish"); return; }
      state.health = clamp(state.health + 15, 0, 100);
      startStage(true);
      startRun();
    }

    ui.start.addEventListener("click", startFresh);
    ui.continue.addEventListener("click", startFromSave);
    ui.restart.addEventListener("click", startFresh);
    ui.nextStage.addEventListener("click", enterNextStage);

    let lastFrame = performance.now();
    function frame(now) {
      const dt = Math.min(0.033, (now - lastFrame) / 1000);
      lastFrame = now;
      update(dt);
      ctx.save();
      if (state.screenShake > 0) ctx.translate((Math.random() * 2 - 1) * state.screenShake * 12, (Math.random() * 2 - 1) * state.screenShake * 8);
      ctx.clearRect(-20, -20, window.innerWidth + 40, window.innerHeight + 40);
      drawBackground();
      drawRoad();
      drawDenseScenery();
      drawCollectibles();
      drawBoostPads();
      drawHazards();
      drawGate();
      drawPlayer();
      drawParticles();
      ctx.restore();
      requestAnimationFrame(frame);
    }

    resetState();
    if (!loadGame()) {
      ui.continue.disabled = true;
      ui.continue.style.opacity = "0.5";
      updateMenu("start");
    } else {
      ui.continue.disabled = false;
      ui.continue.style.opacity = "1";
      resetState();
      updateMenu("resume");
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
